name: Build & Deploy to AWS EC2

on:
  push:
    branches: [policy-agent-v3, master, main]

env:
  ECR_REPO: policy-agent

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build Docker image and push to ECR
  # ──────────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Set image metadata
        id: meta
        run: |
          TAG=${GITHUB_SHA::7}
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build & Push
        run: |
          URI=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}
          TAG=${{ steps.meta.outputs.image_tag }}
          docker build -t $URI:$TAG -t $URI:latest .
          docker push $URI:$TAG
          docker push $URI:latest

  # ──────────────────────────────────────────────
  # Job 2: Lint & Test
  # ──────────────────────────────────────────────
  test:
    name: Lint & Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint with Ruff
        run: ruff check . --output-format=github

      - name: Run tests
        env:
          OPENAI_API_KEY: "dummy-key"
          DEEPSEEK_API_KEY: "dummy-key"
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          POSTGRES_URI: "postgresql://dummy:dummy@localhost:5432/dummy"
          REDIS_URL: "redis://localhost:6379"
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # Job 3: Deploy to Staging EC2
  # ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: [build, test]
    if: github.ref == 'refs/heads/policy-agent-v3'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_STAGING_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ needs.build.outputs.image_tag }}

            # Stop old container and clean up disk
            docker stop policy-agent 2>/dev/null || true
            docker rm policy-agent 2>/dev/null || true
            docker system prune -af

            # Pull and run new image
            docker pull $IMAGE
            docker run -d \
              --name policy-agent \
              --restart unless-stopped \
              --env-file /opt/policy-agent/.env \
              -p 8000:8000 \
              $IMAGE

            # Wait for app to boot (DB connections, LLM init, etc.)
            echo "Waiting 30s for app to start..."
            sleep 30

            # Health check with retries
            echo "Running health checks..."
            for i in $(seq 1 15); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "✅ Staging is healthy!"
                exit 0
              fi
              echo "  Attempt $i/15..."
              sleep 10
            done
            echo "❌ Health check failed"
            docker logs policy-agent --tail 50
            exit 1

  # ──────────────────────────────────────────────
  # Job 3: Deploy to Production (manual approval)
  # ──────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [build, test]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_PROD_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ needs.build.outputs.image_tag }}

            # Stop old container and clean up disk
            docker stop policy-agent 2>/dev/null || true
            docker rm policy-agent 2>/dev/null || true
            docker system prune -af

            # Pull and run new image
            docker pull $IMAGE
            docker run -d \
              --name policy-agent \
              --restart unless-stopped \
              --env-file /opt/policy-agent/.env \
              -p 8000:8000 \
              $IMAGE

            # Wait for app to boot (DB connections, LLM init, etc.)
            echo "Waiting 30s for app to start..."
            sleep 30

            # Health check with retries
            echo "Running health checks..."
            for i in $(seq 1 15); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "✅ Production is healthy!"
                exit 0
              fi
              echo "  Attempt $i/15..."
              sleep 10
            done
            echo "❌ Health check failed"
            docker logs policy-agent --tail 50
            exit 1
