name: Build & Deploy to AWS EC2

on:
  push:
    branches: [policy-agent-v3]

env:
  ECR_REPO: policy-agent

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build Docker image and push to ECR
  # ──────────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Set image metadata
        id: meta
        run: |
          TAG=${GITHUB_SHA::7}
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build & Push
        run: |
          URI=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}
          TAG=${{ steps.meta.outputs.image_tag }}
          docker build -t $URI:$TAG -t $URI:latest .
          docker push $URI:$TAG
          docker push $URI:latest

  # ──────────────────────────────────────────────
  # Job 2: Deploy to Staging EC2
  # ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_STAGING_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ needs.build.outputs.image_tag }}

            # Stop old container
            docker stop policy-agent 2>/dev/null || true
            docker rm policy-agent 2>/dev/null || true

            # Pull and run new image
            docker pull $IMAGE
            docker run -d \
              --name policy-agent \
              --restart unless-stopped \
              --env-file /opt/policy-agent/.env \
              -p 8000:8000 \
              $IMAGE

            # Wait for health check
            echo "Waiting for health check..."
            for i in $(seq 1 10); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "✅ Staging is healthy!"
                exit 0
              fi
              echo "  Attempt $i/10..."
              sleep 5
            done
            echo "❌ Health check failed"
            docker logs policy-agent
            exit 1

  # ──────────────────────────────────────────────
  # Job 3: Deploy to Production (manual approval)
  # ──────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_PROD_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ needs.build.outputs.image_tag }}

            # Stop old container
            docker stop policy-agent 2>/dev/null || true
            docker rm policy-agent 2>/dev/null || true

            # Pull and run new image
            docker pull $IMAGE
            docker run -d \
              --name policy-agent \
              --restart unless-stopped \
              --env-file /opt/policy-agent/.env \
              -p 8000:8000 \
              $IMAGE

            # Wait for health check
            echo "Waiting for health check..."
            for i in $(seq 1 10); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "✅ Production is healthy!"
                exit 0
              fi
              echo "  Attempt $i/10..."
              sleep 5
            done
            echo "❌ Health check failed"
            docker logs policy-agent
            exit 1
