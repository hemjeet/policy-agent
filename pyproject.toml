[tool.ruff]
target-version = "py311"
line-length = 120

# Exclude old/experimental files from linting
exclude = [
    "agno_agent.py",
    "agno_agent_v2.py",
    "agno_agent_v3.py",
    "test_workflow.py",
    "test.ipynb",
    "locustfile.py",
    "scripts/",
]

[tool.ruff.lint]
select = ["E", "F", "W"]

[tool.ruff.lint.per-file-ignores]
"agent/config.py" = ["E402", "E501"]
"data/models.py" = ["E501"]
"gradio_ui.py" = ["E501"]
